
  <!DOCTYPE html>
  <html lang="fr">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Ovúmá — Apprenez les langues africaines</title>
      <link rel="icon" type="image/png" href="/favicon.png" />
      <link rel="apple-touch-icon" href="/favicon.png" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <!-- Google Analytics -->
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-YYMXR4X2JX"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-YYMXR4X2JX');
      </script>
      <!-- Netlify Identity Widget : nécessaire pour gérer les invitations et réinitialisation de mot de passe -->
      <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      <!-- Redirige vers /admin/ après connexion via lien d'invitation -->
      <script>
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("init", function(user) {
            if (!user) {
              window.netlifyIdentity.on("login", function() {
                document.location.href = "/admin/";
              });
            }
          });
        }
      </script>
    </body>
  </html>
